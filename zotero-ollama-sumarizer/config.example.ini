# Copy this file to config.ini and fill in your own values.
# config.ini is gitignored so your credentials never end up in the repository.
# Environment variables with the same (uppercased) names override these values.

[zotero]
# Your numeric Zotero user ID and an API key with read/write access,
# both from https://www.zotero.org/settings/keys
zotero_library_id = 1234567
zotero_api_key = your-zotero-api-key-here

# "user" for your personal library, "group" for a group library
zotero_library_type = user

# Local Zotero storage folder, used as a fallback for extracting PDF text
# when the Zotero server has no fulltext index for an item.
# Defaults to ~/Zotero/storage if omitted.
# zotero_storage_dir = C:\Users\you\Zotero\storage

[ollama]
# Base URL of your local Ollama server.
ollama_url = http://localhost:11434

# Any model you have pulled locally (ollama list).
ollama_model = gemma4:26b-a4b-it-q4_K_M
